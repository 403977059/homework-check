<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>郭雨晨 作业打卡</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    background: #fce8ef;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 24px 12px 40px;
    color: #333;
  }

  .container {
    max-width: 480px;
    width: 100%;
  }

  /* ── Header ── */
  .header {
    text-align: center;
    margin-bottom: 20px;
  }

  .header .name-title {
    font-size: 22px;
    font-weight: 700;
    color: #d4617a;
    margin-bottom: 2px;
  }

  .header .name-title .emoji {
    font-size: 24px;
  }

  .header .subtitle {
    font-size: 12px;
    color: #e8a0b4;
    letter-spacing: 4px;
    margin-bottom: 8px;
  }

  .header .date-display {
    font-size: 15px;
    color: #d4a0b0;
    margin-bottom: 2px;
  }

  .header .today-hint {
    font-size: 12px;
    color: #e8a0b4;
  }

  /* ── Progress ── */
  .progress-section {
    background: #fff;
    border-radius: 16px;
    padding: 16px 20px;
    box-shadow: 0 2px 12px rgba(212,97,122,0.10);
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border: 1px solid #fce0e8;
  }

  .progress-label {
    font-size: 15px;
    font-weight: 600;
    color: #d4617a;
    white-space: nowrap;
  }

  .progress-label span {
    color: #e8a0b4;
    font-weight: 400;
    margin: 0 2px;
  }

  .progress-bar-wrap {
    flex: 1;
    height: 8px;
    background: #f5e0e8;
    border-radius: 4px;
    margin: 0 14px;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #f48fb1, #ec407a);
    border-radius: 4px;
    transition: width 0.5s ease;
  }

  .progress-count {
    font-size: 18px;
    font-weight: 700;
    color: #d4617a;
    min-width: 42px;
    text-align: right;
  }

  /* ── Subject Cards ── */
  .subjects {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 8px;
  }

  .subject-card {
    background: #fff;
    border-radius: 18px;
    padding: 18px 10px 12px;
    text-align: center;
    box-shadow: 0 2px 12px rgba(212,97,122,0.10);
    cursor: pointer;
    transition: all 0.25s ease;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    position: relative;
    border: 1px solid #fce0e8;
  }

  .subject-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 16px rgba(212,97,122,0.15);
  }

  .subject-card:active {
    transform: scale(0.95);
  }

  .subject-card .emoji {
    font-size: 30px;
    display: block;
    margin-bottom: 4px;
  }

  .subject-card .name {
    font-size: 15px;
    font-weight: 600;
    color: #d4617a;
    margin-bottom: 8px;
  }

  .check-circle {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: 3px solid #f0d6e0;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s ease;
    margin: 0 auto 6px;
  }

  .check-circle svg {
    width: 20px;
    height: 18px;
    opacity: 0;
    transition: opacity 0.25s ease;
  }

  .subject-card.completed {
    background: #faf0f4;
    opacity: 0.75;
    border-color: #f0d6e0;
  }

  .subject-card.completed .check-circle {
    border-color: #e8a0b4;
    background: #e8a0b4;
  }

  .subject-card.completed .check-circle svg {
    opacity: 1;
    stroke: #fff;
  }

  .subject-card.completed .name {
    color: #c08a9a;
  }

  .subject-card.disabled {
    cursor: default !important;
    opacity: 0.55 !important;
    pointer-events: none !important;
  }

  .subject-card.disabled:hover {
    transform: none !important;
    box-shadow: 0 2px 12px rgba(212,97,122,0.10) !important;
  }

  .subject-card.disabled:active {
    transform: none !important;
  }

  .subject-card .only-today-badge {
    display: none;
    position: absolute;
    bottom: 4px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 8px;
    color: #d4a0b0;
    white-space: nowrap;
    letter-spacing: 0.5px;
  }

  .subject-card.disabled .only-today-badge {
    display: block;
  }

  .subject-card.disabled .check-circle {
    border-color: #f0d6e0 !important;
    background: transparent !important;
  }

  .subject-card.disabled.completed .check-circle {
    background: #f0d6e0 !important;
    border-color: #f0d6e0 !important;
  }

  .subject-card.disabled.completed .check-circle svg {
    opacity: 1 !important;
    stroke: #fff !important;
  }

  .subject-card.disabled .check-circle svg {
    opacity: 0.6 !important;
    stroke: #d4a0b0 !important;
  }

  .subject-card.chinese .check-circle { border-color: #f48fb1; }
  .subject-card.chinese.completed .check-circle {
    border-color: #e8a0b4; background: #e8a0b4;
  }
  .subject-card.chinese .name { color: #d4617a; }

  .subject-card.math .check-circle { border-color: #81d4c8; }
  .subject-card.math.completed .check-circle {
    border-color: #a8d0ca; background: #a8d0ca;
  }
  .subject-card.math .name { color: #4a9d95; }

  .subject-card.english .check-circle { border-color: #b39ddb; }
  .subject-card.english.completed .check-circle {
    border-color: #c8b8d8; background: #c8b8d8;
  }
  .subject-card.english .name { color: #8b6fd6; }

  /* ── Photos in Cards ── */
  .photos-row {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    justify-content: center;
    min-height: 0;
    margin-bottom: 4px;
  }

  .photo-thumb {
    position: relative;
    width: 36px;
    height: 36px;
    border-radius: 6px;
    overflow: hidden;
    flex-shrink: 0;
    border: 1px solid #f0d6e0;
    cursor: pointer;
  }

  .photo-thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .photo-thumb .photo-del-btn {
    position: absolute;
    top: -4px;
    right: -4px;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    border: none;
    background: #e74c5e;
    color: #fff;
    font-size: 10px;
    line-height: 16px;
    text-align: center;
    cursor: pointer;
    display: none;
    z-index: 2;
    padding: 0;
  }

  .photo-thumb:hover .photo-del-btn {
    display: block;
  }

  .photo-add-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: 2px dashed #f0d6e0;
    background: #faf5f7;
    color: #e8a0b4;
    cursor: pointer;
    font-size: 16px;
    transition: all 0.2s;
    margin: 0 auto 4px;
    padding: 0;
    line-height: 1;
  }

  .photo-add-btn:hover {
    border-color: #d4617a;
    color: #d4617a;
    background: #fce8ef;
  }

  .photo-count-label {
    font-size: 10px;
    color: #d4a0b0;
    display: block;
    margin-bottom: 2px;
  }

  .photo-uploading {
    font-size: 10px;
    color: #e8a0b4;
    display: block;
    margin-bottom: 2px;
  }

  /* ── Calendar ── */
  .calendar-section {
    background: #fff;
    border-radius: 18px;
    padding: 18px 16px 14px;
    box-shadow: 0 2px 12px rgba(212,97,122,0.10);
    border: 1px solid #fce0e8;
  }

  .calendar-section .cal-title-deco {
    text-align: center;
    font-size: 12px;
    color: #e8a0b4;
    margin-bottom: 10px;
    letter-spacing: 3px;
  }

  .cal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }

  .cal-header .month-label {
    font-size: 17px;
    font-weight: 700;
    color: #d4617a;
  }

  .cal-nav {
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .cal-nav button {
    background: #fce8ef;
    border: none;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    font-size: 18px;
    cursor: pointer;
    color: #d4617a;
    transition: all 0.2s;
    line-height: 1;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .cal-nav button:hover {
    background: #f0c8d8;
    color: #c0506a;
  }

  .cal-weekdays {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    text-align: center;
    font-size: 12px;
    font-weight: 600;
    color: #e8a0b4;
    margin-bottom: 4px;
  }

  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 1px;
  }

  .cal-day {
    aspect-ratio: 0.95;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.2s ease;
    font-size: 14px;
    font-weight: 500;
    color: #5a4a50;
    position: relative;
    gap: 2px;
    -webkit-tap-highlight-color: transparent;
  }

  .cal-day:hover { background: #fce8ef; }
  .cal-day.empty { cursor: default; }
  .cal-day.empty:hover { background: transparent; }

  .cal-day.today {
    font-weight: 700;
    color: #ec407a;
  }

  .cal-day.today .day-num::after {
    content: '';
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    width: 20px;
    height: 2px;
    background: #ec407a;
    border-radius: 1px;
  }

  .cal-day.selected {
    background: #f48fb1;
    color: #fff;
    font-weight: 700;
    box-shadow: 0 2px 8px rgba(244,143,177,0.3);
  }

  .cal-day.selected:hover { background: #ec407a; }

  .cal-day .day-num {
    font-size: 14px;
    line-height: 1.3;
    position: relative;
  }

  .cal-day .dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    transition: background 0.2s;
    margin-top: 1px;
  }

  .cal-day .dot.pink { background: #f48fb1; }
  .cal-day .dot.gray { background: #d0c8c8; }
  .cal-day .dot.none { background: transparent; }

  .cal-day.selected .dot.pink { background: #fff; }
  .cal-day.selected .dot.gray { background: #f0ecec; }

  /* ── Legend ── */
  .legend {
    display: flex;
    justify-content: center;
    gap: 24px;
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid #fce0e8;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: #8a7a80;
  }

  .legend-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
  }

  .legend-dot.pink { background: #f48fb1; }
  .legend-dot.gray { background: #d0c8c8; }

  /* ── Monthly Stats ── */
  .monthly-stats {
    background: #fff;
    border-radius: 18px;
    padding: 18px 20px 16px;
    box-shadow: 0 2px 12px rgba(212,97,122,0.10);
    border: 1px solid #fce0e8;
    margin-top: 16px;
  }

  .monthly-stats .stats-title {
    text-align: center;
    font-size: 13px;
    color: #e8a0b4;
    margin-bottom: 16px;
    letter-spacing: 2px;
  }

  .stats-body {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .donut-wrap {
    flex-shrink: 0;
    position: relative;
    width: 88px;
    height: 88px;
  }

  .donut-wrap svg {
    transform: rotate(-90deg);
  }

  .donut-center {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
  }

  .donut-center .pct {
    font-size: 20px;
    font-weight: 700;
    color: #d4617a;
    line-height: 1.1;
  }

  .donut-center .pct-label {
    font-size: 9px;
    color: #e8a0b4;
    line-height: 1;
  }

  .stats-detail {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .stats-row {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: #5a4a50;
  }

  .stats-row .dot-icon {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .stats-row .dot-icon.pink { background: #f48fb1; }
  .stats-row .dot-icon.gray { background: #d0c8c8; }

  .stats-row .num {
    font-weight: 700;
    color: #d4617a;
    margin-left: auto;
  }

  .stats-row .num.gray-num {
    color: #b0a8a8;
  }

  /* ── Lightbox ── */
  .lightbox {
    position: fixed;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.85);
    z-index: 9999;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.25s ease;
    pointer-events: none;
  }

  .lightbox.open {
    opacity: 1;
    pointer-events: auto;
  }

  .lightbox img {
    max-width: 92%;
    max-height: 88%;
    border-radius: 8px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.5);
    object-fit: contain;
  }

  .lightbox-close {
    position: absolute;
    top: 18px;
    right: 22px;
    font-size: 32px;
    color: #fff;
    cursor: pointer;
    width: 44px;
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    background: rgba(255,255,255,0.15);
    transition: background 0.2s;
    line-height: 1;
  }

  .lightbox-close:hover {
    background: rgba(255,255,255,0.3);
  }

  .lightbox-nav {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    font-size: 28px;
    color: #fff;
    cursor: pointer;
    width: 44px;
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    background: rgba(255,255,255,0.15);
    transition: background 0.2s;
    line-height: 1;
    user-select: none;
  }

  .lightbox-nav:hover {
    background: rgba(255,255,255,0.3);
  }

  .lightbox-nav.prev { left: 14px; }
  .lightbox-nav.next { right: 14px; }

  /* ── Responsive ── */
  @media (max-width: 400px) {
    .subjects { gap: 8px; }
    .subject-card { padding: 14px 6px 10px; }
    .subject-card .emoji { font-size: 24px; }
    .subject-card .name { font-size: 13px; }
    .check-circle { width: 28px; height: 28px; border-width: 2px; }
    .check-circle svg { width: 14px; height: 14px; }
    .photo-thumb { width: 30px; height: 30px; }
    .photo-add-btn { width: 24px; height: 24px; font-size: 13px; }
    .container { padding: 0; }
    body { padding: 16px 8px 24px; }
    .progress-section { padding: 12px 14px; }
    .cal-day { aspect-ratio: 1; }
    .donut-wrap { width: 72px; height: 72px; }
    .donut-center .pct { font-size: 16px; }
  }

  @media (min-width: 600px) {
    .subject-card { padding: 24px 16px 18px; }
    .subject-card .emoji { font-size: 36px; }
    .check-circle { width: 42px; height: 42px; }
    .check-circle svg { width: 24px; height: 24px; }
    .photo-thumb { width: 46px; height: 46px; }
    .photo-add-btn { width: 34px; height: 34px; font-size: 18px; }
  }
</style>
</head>
<body>

<div class="container">

  <!-- Header -->
  <div class="header">
    <div class="name-title"><span class="emoji">🌸</span> 郭雨晨</div>
    <div class="subtitle">✦ 作业打卡小达人 ✦</div>
    <div class="date-display" id="dateDisplay"></div>
    <div class="today-hint" id="todayHint"></div>
  </div>

  <!-- Daily Progress -->
  <div class="progress-section">
    <div class="progress-label">今日完成 <span>|</span></div>
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progressFill"></div>
    </div>
    <div class="progress-count" id="progressCount">0/3</div>
  </div>

  <!-- Subject Cards -->
  <div class="subjects">
    <div class="subject-card chinese" data-subject="语文">
      <span class="emoji">📖</span>
      <div class="name">语文</div>
      <div class="check-circle">
        <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
      </div>
      <div class="photos-row" id="photos-语文"></div>
      <button class="photo-add-btn" data-subject="语文" title="上传照片">+</button>
      <input type="file" class="photo-input" data-subject="语文" accept="image/*" multiple hidden>
      <span class="only-today-badge">仅限今日打卡</span>
    </div>

    <div class="subject-card math" data-subject="数学">
      <span class="emoji">🔢</span>
      <div class="name">数学</div>
      <div class="check-circle">
        <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
      </div>
      <div class="photos-row" id="photos-数学"></div>
      <button class="photo-add-btn" data-subject="数学" title="上传照片">+</button>
      <input type="file" class="photo-input" data-subject="数学" accept="image/*" multiple hidden>
      <span class="only-today-badge">仅限今日打卡</span>
    </div>

    <div class="subject-card english" data-subject="英语">
      <span class="emoji">🔤</span>
      <div class="name">英语</div>
      <div class="check-circle">
        <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
      </div>
      <div class="photos-row" id="photos-英语"></div>
      <button class="photo-add-btn" data-subject="英语" title="上传照片">+</button>
      <input type="file" class="photo-input" data-subject="英语" accept="image/*" multiple hidden>
      <span class="only-today-badge">仅限今日打卡</span>
    </div>
  </div>

  <!-- Calendar -->
  <div class="calendar-section">
    <div class="cal-title-deco">✦ 打卡日历 ✦</div>
    <div class="cal-header">
      <div class="month-label" id="monthLabel"></div>
      <div class="cal-nav">
        <button id="prevMonth" aria-label="上个月">‹</button>
        <button id="nextMonth" aria-label="下个月">›</button>
      </div>
    </div>
    <div class="cal-weekdays">
      <span>日</span><span>一</span><span>二</span><span>三</span>
      <span>四</span><span>五</span><span>六</span>
    </div>
    <div class="cal-grid" id="calGrid"></div>
    <div class="legend">
      <div class="legend-item">
        <span class="legend-dot pink"></span> 全部完成
      </div>
      <div class="legend-item">
        <span class="legend-dot gray"></span> 未完成
      </div>
    </div>
  </div>

  <!-- Monthly Stats -->
  <div class="monthly-stats">
    <div class="stats-title">📊 本月打卡统计</div>
    <div class="stats-body" id="statsBody"></div>
  </div>

</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
  <span class="lightbox-close" id="lightboxClose">&times;</span>
  <span class="lightbox-nav prev" id="lightboxPrev">&#8249;</span>
  <img id="lightboxImg" src="" alt="照片预览">
  <span class="lightbox-nav next" id="lightboxNext">&#8250;</span>
</div>

<script>
(function() {
  var SUBJECTS = ['语文', '数学', '英语'];

  // ── 数据层 ──
  var allData = {};
  var selectedDate = todayStr();
  var calYear, calMonth;
  var allPhotos = {};   // { "语文": [...], "数学": [...], "英语": [...] }
  var lightboxPhotos = []; // flattened list for lightbox navigation
  var lightboxIndex = 0;

  function todayStr() {
    var d = new Date();
    return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
  }

  function formatDisplay(str) {
    var p = str.split('-');
    return p[0] + '年' + (+p[1]) + '月' + (+p[2]) + '日';
  }

  function isToday(dateStr) {
    return dateStr === todayStr();
  }

  // ── API 调用 ──
  function loadAllData() {
    return fetch('/api/data')
      .then(function(r) { return r.json(); })
      .then(function(data) {
        allData = data;
        renderAll();
      })
      .catch(function() {
        document.getElementById('dateDisplay').textContent = '⚠️ 无法连接服务器';
      });
  }

  function loadPhotosForDate(dateStr) {
    allPhotos = { '语文': [], '数学': [], '英语': [] };
    var promises = SUBJECTS.map(function(sub) {
      return fetch('/api/photos?date=' + encodeURIComponent(dateStr) + '&subject=' + encodeURIComponent(sub))
        .then(function(r) { return r.json(); })
        .then(function(photos) {
          allPhotos[sub] = photos;
        })
        .catch(function() {});
    });
    return Promise.all(promises).then(function() {
      renderPhotos();
    });
  }

  function getSubjectsForDay(dateStr) {
    var day = allData[dateStr];
    if (!day) return { '语文': false, '数学': false, '英语': false };
    var result = {};
    for (var i = 0; i < SUBJECTS.length; i++) {
      result[SUBJECTS[i]] = !!day[SUBJECTS[i]];
    }
    return result;
  }

  function toggleSubject(dateStr, subject) {
    if (dateStr !== todayStr()) return;
    fetch('/api/toggle', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ date: dateStr, subject: subject })
    })
      .then(function(r) { return r.json(); })
      .then(function(subjects) {
        allData[dateStr] = subjects;
        renderAll();
      });
  }

  function getDateStatus(dateStr) {
    var subjects = getSubjectsForDay(dateStr);
    var done = 0;
    for (var i = 0; i < SUBJECTS.length; i++) {
      if (subjects[SUBJECTS[i]]) done++;
    }
    return { done: done, total: SUBJECTS.length, subjects: subjects };
  }

  function getMonthlyStats(year, month) {
    var now = new Date();
    var isCurrentMonth = (year === now.getFullYear() && month === now.getMonth());
    var daysInMonth = new Date(year, month + 1, 0).getDate();
    var maxDay = isCurrentMonth ? now.getDate() : daysInMonth;
    var completed = 0, incomplete = 0;

    for (var d = 1; d <= maxDay; d++) {
      var dateStr = year + '-' + String(month+1).padStart(2,'0') + '-' + String(d).padStart(2,'0');
      if (allData[dateStr]) {
        var allDone = true;
        for (var i = 0; i < SUBJECTS.length; i++) {
          if (!allData[dateStr][SUBJECTS[i]]) { allDone = false; break; }
        }
        if (allDone) completed++;
        else incomplete++;
      }
    }
    return { completed: completed, incomplete: incomplete, total: completed + incomplete };
  }

  // ── 渲染 ──
  function renderAll() {
    renderProgress();
    renderSubjectCards();
    renderCalendar();
    renderMonthlyStats();
  }

  function renderProgress() {
    var status = getDateStatus(selectedDate);
    document.getElementById('dateDisplay').textContent = formatDisplay(selectedDate);

    var hint = document.getElementById('todayHint');
    hint.textContent = isToday(selectedDate) ? '✨ 今天也要加油哦 ✨' : '📋 查看历史记录';

    var fill = document.getElementById('progressFill');
    var count = document.getElementById('progressCount');
    var pct = status.total > 0 ? (status.done / status.total * 100) : 0;
    fill.style.width = pct + '%';
    count.textContent = status.done + '/' + status.total;

    var label = document.querySelector('.progress-label');
    label.innerHTML = isToday(selectedDate) ? '今日完成 <span>|</span>' : '已完成 <span>|</span>';
  }

  function renderSubjectCards() {
    var status = getDateStatus(selectedDate);
    var todayFlag = isToday(selectedDate);
    var cards = document.querySelectorAll('.subject-card');
    for (var i = 0; i < cards.length; i++) {
      var card = cards[i];
      var subject = card.dataset.subject;
      var completed = status.subjects[subject];
      card.classList.toggle('completed', completed);
      card.classList.toggle('disabled', !todayFlag);
    }
  }

  function renderCalendar() {
    var now = new Date();
    if (calYear === undefined) calYear = now.getFullYear();
    if (calMonth === undefined) calMonth = now.getMonth();

    document.getElementById('monthLabel').textContent = calYear + '年 ' + (calMonth + 1) + '月';

    var grid = document.getElementById('calGrid');
    grid.innerHTML = '';

    var firstDay = new Date(calYear, calMonth, 1).getDay();
    var daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
    var today = todayStr();

    for (var i = 0; i < firstDay; i++) {
      var cell = document.createElement('div');
      cell.className = 'cal-day empty';
      grid.appendChild(cell);
    }

    for (var d = 1; d <= daysInMonth; d++) {
      var dateStr = calYear + '-' + String(calMonth+1).padStart(2,'0') + '-' + String(d).padStart(2,'0');
      var cell = document.createElement('div');
      cell.className = 'cal-day';
      if (dateStr === today) cell.classList.add('today');
      if (dateStr === selectedDate) cell.classList.add('selected');

      var numSpan = document.createElement('span');
      numSpan.className = 'day-num';
      numSpan.textContent = d;
      cell.appendChild(numSpan);

      var dot = document.createElement('span');
      dot.className = 'dot';

      if (allData[dateStr]) {
        var allDone = true;
        for (var i = 0; i < SUBJECTS.length; i++) {
          if (!allData[dateStr][SUBJECTS[i]]) { allDone = false; break; }
        }
        dot.classList.add(allDone ? 'pink' : 'gray');
      } else {
        dot.classList.add('none');
      }

      cell.appendChild(dot);

      cell.addEventListener('click', (function(ds) {
        return function() {
          selectedDate = ds;
          renderAll();
          loadPhotosForDate(ds);
        };
      })(dateStr));

      grid.appendChild(cell);
    }
  }

  function renderMonthlyStats() {
    var now = new Date();
    var y = calYear !== undefined ? calYear : now.getFullYear();
    var m = calMonth !== undefined ? calMonth : now.getMonth();
    var stats = getMonthlyStats(y, m);
    var body = document.getElementById('statsBody');

    if (stats.total === 0) {
      body.innerHTML = '<div style="text-align:center;color:#e8a0b4;font-size:13px;padding:6px 0;">本月还没有打卡记录哦 🌱</div>';
      return;
    }

    var pct = Math.round(stats.completed / stats.total * 100);
    var r = 36;
    var circumference = 2 * Math.PI * r;
    var offset = circumference - (pct / 100) * circumference;

    body.innerHTML =
      '<div class="donut-wrap">' +
        '<svg width="88" height="88" viewBox="0 0 88 88">' +
          '<circle cx="44" cy="44" r="' + r + '" fill="none" stroke="#f0e8ea" stroke-width="6"/>' +
          '<circle cx="44" cy="44" r="' + r + '" fill="none" stroke="#f48fb1" stroke-width="6"' +
            ' stroke-dasharray="' + circumference + '" stroke-dashoffset="' + offset + '"' +
            ' stroke-linecap="round" transform="rotate(-90,44,44)"/>' +
        '</svg>' +
        '<div class="donut-center"><div class="pct">' + pct + '%</div><div class="pct-label">完成率</div></div>' +
      '</div>' +
      '<div class="stats-detail">' +
        '<div class="stats-row"><span class="dot-icon pink"></span>全部完成 <span class="num">' + stats.completed + '天</span></div>' +
        '<div class="stats-row"><span class="dot-icon gray"></span>未完成 <span class="num gray-num">' + stats.incomplete + '天</span></div>' +
        '<div class="stats-row" style="margin-top:2px;padding-top:6px;border-top:1px solid #fce8ef;font-size:12px;color:#e8a0b4;">' +
          '共打卡 <span style="font-weight:600;color:#d4617a;">' + stats.total + '</span> 天</div>' +
      '</div>';
  }

  // ── 照片渲染 ──
  function renderPhotos() {
    var todayFlag = isToday(selectedDate);
    SUBJECTS.forEach(function(sub) {
      var container = document.getElementById('photos-' + sub);
      container.innerHTML = '';
      var photos = allPhotos[sub] || [];
      photos.forEach(function(photo, idx) {
        var thumb = document.createElement('div');
        thumb.className = 'photo-thumb';
        thumb.title = '点击查看大图';

        var img = document.createElement('img');
        img.src = photo.url;
        img.alt = '作业照片';
        img.loading = 'lazy';
        thumb.appendChild(img);

        if (todayFlag) {
          var delBtn = document.createElement('button');
          delBtn.className = 'photo-del-btn';
          delBtn.textContent = '×';
          delBtn.title = '删除';
          delBtn.dataset.photoId = photo.id;
          delBtn.addEventListener('click', function(e) {
            e.stopPropagation();
            deletePhoto(photo.id);
          });
          thumb.appendChild(delBtn);
        }

        thumb.addEventListener('click', function() {
          openLightbox(sub, idx);
        });

        container.appendChild(thumb);
      });
    });
  }

  // ── 上传照片 ──
  function handleFileSelect(subject) {
    var input = document.querySelector('.photo-input[data-subject="' + subject + '"]');
    var files = input.files;
    if (!files || files.length === 0) return;

    var addBtn = document.querySelector('.photo-add-btn[data-subject="' + subject + '"]');
    addBtn.textContent = '...';
    addBtn.disabled = true;

    var formData = new FormData();
    formData.append('date', selectedDate);
    formData.append('subject', subject);
    for (var i = 0; i < files.length; i++) {
      formData.append('photos', files[i]);
    }

    fetch('/api/upload', {
      method: 'POST',
      body: formData
    })
      .then(function(r) { return r.json(); })
      .then(function(result) {
        input.value = '';
        addBtn.textContent = '+';
        addBtn.disabled = false;
        loadPhotosForDate(selectedDate);
      })
      .catch(function() {
        addBtn.textContent = '+';
        addBtn.disabled = false;
      });
  }

  // ── 删除照片 ──
  function deletePhoto(photoId) {
    fetch('/api/photo/' + photoId, { method: 'DELETE' })
      .then(function(r) { return r.json(); })
      .then(function(result) {
        if (result.success) {
          loadPhotosForDate(selectedDate);
        }
      })
      .catch(function() {});
  }

  // ── Lightbox ──
  function openLightbox(subject, index) {
    lightboxPhotos = allPhotos[subject] || [];
    if (lightboxPhotos.length === 0) return;
    lightboxIndex = index;
    showLightboxImage();
    document.getElementById('lightbox').classList.add('open');
  }

  function showLightboxImage() {
    var img = document.getElementById('lightboxImg');
    if (lightboxPhotos.length > 0 && lightboxIndex >= 0 && lightboxIndex < lightboxPhotos.length) {
      img.src = lightboxPhotos[lightboxIndex].url;
    }
    var prev = document.getElementById('lightboxPrev');
    var next = document.getElementById('lightboxNext');
    prev.style.display = lightboxPhotos.length > 1 ? 'flex' : 'none';
    next.style.display = lightboxPhotos.length > 1 ? 'flex' : 'none';
  }

  function closeLightbox() {
    document.getElementById('lightbox').classList.remove('open');
  }

  function prevLightbox() {
    if (lightboxPhotos.length < 2) return;
    lightboxIndex--;
    if (lightboxIndex < 0) lightboxIndex = lightboxPhotos.length - 1;
    showLightboxImage();
  }

  function nextLightbox() {
    if (lightboxPhotos.length < 2) return;
    lightboxIndex++;
    if (lightboxIndex >= lightboxPhotos.length) lightboxIndex = 0;
    showLightboxImage();
  }

  // ── 事件绑定 ──
  var cards = document.querySelectorAll('.subject-card');
  for (var i = 0; i < cards.length; i++) {
    cards[i].addEventListener('click', function(e) {
      if (!isToday(selectedDate)) return;
      toggleSubject(selectedDate, this.dataset.subject);
    });
  }

  // Upload buttons
  var addBtns = document.querySelectorAll('.photo-add-btn');
  for (var i = 0; i < addBtns.length; i++) {
    addBtns[i].addEventListener('click', function(e) {
      e.stopPropagation();
      if (!isToday(selectedDate)) return;
      var input = document.querySelector('.photo-input[data-subject="' + this.dataset.subject + '"]');
      input.click();
    });
  }

  // File inputs
  var photoInputs = document.querySelectorAll('.photo-input');
  for (var i = 0; i < photoInputs.length; i++) {
    photoInputs[i].addEventListener('change', function(e) {
      var sub = this.dataset.subject;
      handleFileSelect(sub);
    });
  }

  // Calendar nav
  document.getElementById('prevMonth').addEventListener('click', function() {
    calMonth--;
    if (calMonth < 0) { calMonth = 11; calYear--; }
    renderCalendar();
    renderMonthlyStats();
  });

  document.getElementById('nextMonth').addEventListener('click', function() {
    calMonth++;
    if (calMonth > 11) { calMonth = 0; calYear++; }
    renderCalendar();
    renderMonthlyStats();
  });

  // Lightbox
  document.getElementById('lightboxClose').addEventListener('click', closeLightbox);
  document.getElementById('lightboxPrev').addEventListener('click', function(e) {
    e.stopPropagation();
    prevLightbox();
  });
  document.getElementById('lightboxNext').addEventListener('click', function(e) {
    e.stopPropagation();
    nextLightbox();
  });

  document.getElementById('lightbox').addEventListener('click', function(e) {
    if (e.target === this) closeLightbox();
  });

  document.addEventListener('keydown', function(e) {
    if (!document.getElementById('lightbox').classList.contains('open')) return;
    if (e.key === 'Escape') closeLightbox();
    if (e.key === 'ArrowLeft') prevLightbox();
    if (e.key === 'ArrowRight') nextLightbox();
  });

  // ── 启动 ──
  loadAllData().then(function() {
    loadPhotosForDate(selectedDate);
  });
})();
</script>
</body>
</html>
