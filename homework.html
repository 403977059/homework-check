<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>作业打卡</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    background: #fce8ef;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 24px 12px 40px;
    color: #333;
  }

  .container {
    max-width: 480px;
    width: 100%;
  }

  /* ── Header ── */
  .header {
    text-align: center;
    margin-bottom: 20px;
  }

  .header h1 {
    font-size: 28px;
    font-weight: 700;
    color: #d4617a;
    margin-bottom: 2px;
  }

  .header .date-display {
    font-size: 15px;
    color: #e8a0b4;
    margin-bottom: 2px;
  }

  .header .today-hint {
    font-size: 12px;
    color: #e8a0b4;
  }

  /* ── Progress ── */
  .progress-section {
    background: #fff;
    border-radius: 16px;
    padding: 16px 20px;
    box-shadow: 0 2px 12px rgba(212,97,122,0.10);
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border: 1px solid #fce0e8;
  }

  .progress-label {
    font-size: 15px;
    font-weight: 600;
    color: #d4617a;
    white-space: nowrap;
  }

  .progress-label span {
    color: #e8a0b4;
    font-weight: 400;
    margin: 0 2px;
  }

  .progress-bar-wrap {
    flex: 1;
    height: 8px;
    background: #f5e0e8;
    border-radius: 4px;
    margin: 0 14px;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #f48fb1, #ec407a);
    border-radius: 4px;
    transition: width 0.5s ease;
  }

  .progress-count {
    font-size: 18px;
    font-weight: 700;
    color: #d4617a;
    min-width: 42px;
    text-align: right;
  }

  /* ── Subject Cards ── */
  .subjects {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 28px;
  }

  .subject-card {
    background: #fff;
    border-radius: 18px;
    padding: 18px 10px 14px;
    text-align: center;
    box-shadow: 0 2px 12px rgba(212,97,122,0.10);
    cursor: pointer;
    transition: all 0.25s ease;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    position: relative;
    border: 1px solid #fce0e8;
  }

  .subject-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 16px rgba(212,97,122,0.15);
  }

  .subject-card:active {
    transform: scale(0.95);
  }

  .subject-card .emoji {
    font-size: 30px;
    display: block;
    margin-bottom: 4px;
  }

  .subject-card .name {
    font-size: 15px;
    font-weight: 600;
    color: #d4617a;
    margin-bottom: 8px;
  }

  /* Check circle */
  .check-circle {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: 3px solid #f0d6e0;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s ease;
    margin: 0 auto;
  }

  .check-circle svg {
    width: 20px;
    height: 18px;
    opacity: 0;
    transition: opacity 0.25s ease;
  }

  /* Completed state */
  .subject-card.completed {
    background: #faf0f4;
    opacity: 0.75;
    border-color: #f0d6e0;
  }

  .subject-card.completed .check-circle {
    border-color: #e8a0b4;
    background: #e8a0b4;
  }

  .subject-card.completed .check-circle svg {
    opacity: 1;
    stroke: #fff;
  }

  .subject-card.completed .name {
    color: #c08a9a;
  }

  /* Disabled state (not today) */
  .subject-card.disabled {
    cursor: default !important;
    opacity: 0.55 !important;
    pointer-events: none !important;
  }

  .subject-card.disabled:hover {
    transform: none !important;
    box-shadow: 0 2px 12px rgba(212,97,122,0.10) !important;
  }

  .subject-card.disabled:active {
    transform: none !important;
  }

  .subject-card .only-today-badge {
    display: none;
    position: absolute;
    bottom: 4px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 8px;
    color: #d4a0b0;
    white-space: nowrap;
    letter-spacing: 0.5px;
  }

  .subject-card.disabled .only-today-badge {
    display: block;
  }

  .subject-card.disabled .check-circle {
    border-color: #f0d6e0 !important;
    background: transparent !important;
  }

  .subject-card.disabled.completed .check-circle {
    background: #f0d6e0 !important;
    border-color: #f0d6e0 !important;
  }

  .subject-card.disabled.completed .check-circle svg {
    opacity: 1 !important;
    stroke: #fff !important;
  }

  .subject-card.disabled .check-circle svg {
    opacity: 0.6 !important;
    stroke: #d4a0b0 !important;
  }

  /* Accent rings per subject */
  .subject-card.chinese .check-circle { border-color: #f48fb1; }
  .subject-card.chinese.completed .check-circle {
    border-color: #e8a0b4; background: #e8a0b4;
  }
  .subject-card.chinese .name { color: #d4617a; }

  .subject-card.math .check-circle { border-color: #81d4c8; }
  .subject-card.math.completed .check-circle {
    border-color: #a8d0ca; background: #a8d0ca;
  }
  .subject-card.math .name { color: #4a9d95; }

  .subject-card.english .check-circle { border-color: #b39ddb; }
  .subject-card.english.completed .check-circle {
    border-color: #c8b8d8; background: #c8b8d8;
  }
  .subject-card.english .name { color: #8b6fd6; }

  /* ── Calendar ── */
  .calendar-section {
    background: #fff;
    border-radius: 18px;
    padding: 18px 16px 14px;
    box-shadow: 0 2px 12px rgba(212,97,122,0.10);
    border: 1px solid #fce0e8;
  }

  .calendar-section .cal-title-deco {
    text-align: center;
    font-size: 12px;
    color: #e8a0b4;
    margin-bottom: 10px;
    letter-spacing: 3px;
  }

  .cal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }

  .cal-header .month-label {
    font-size: 17px;
    font-weight: 700;
    color: #d4617a;
  }

  .cal-nav {
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .cal-nav button {
    background: #fce8ef;
    border: none;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    font-size: 18px;
    cursor: pointer;
    color: #d4617a;
    transition: all 0.2s;
    line-height: 1;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .cal-nav button:hover {
    background: #f0c8d8;
    color: #c0506a;
  }

  .cal-weekdays {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    text-align: center;
    font-size: 12px;
    font-weight: 600;
    color: #e8a0b4;
    margin-bottom: 4px;
  }

  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 1px;
  }

  .cal-day {
    aspect-ratio: 0.95;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.2s ease;
    font-size: 14px;
    font-weight: 500;
    color: #5a4a50;
    position: relative;
    gap: 2px;
    -webkit-tap-highlight-color: transparent;
  }

  .cal-day:hover { background: #fce8ef; }

  .cal-day.empty { cursor: default; }
  .cal-day.empty:hover { background: transparent; }

  .cal-day.today {
    font-weight: 700;
    color: #ec407a;
  }

  .cal-day.today .day-num::after {
    content: '';
    position: absolute;
    bottom: 20px;
    width: 20px;
    height: 2px;
    background: #ec407a;
    border-radius: 1px;
  }

  .cal-day.selected {
    background: #f48fb1;
    color: #fff;
    font-weight: 700;
    box-shadow: 0 2px 8px rgba(244,143,177,0.3);
  }

  .cal-day.selected:hover { background: #ec407a; }

  .cal-day .day-num {
    font-size: 14px;
    line-height: 1.3;
    position: relative;
  }

  /* Status indicators */
  .cal-day .dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    transition: background 0.2s;
    margin-top: 1px;
  }

  .cal-day .dot.pink { background: #f48fb1; }
  .cal-day .dot.light-red { background: #ef9a9a; }
  .cal-day .dot.none { background: transparent; }

  .cal-day.selected .dot.pink { background: #fff; }
  .cal-day.selected .dot.light-red { background: #fff; }

  /* ── Legend ── */
  .legend {
    display: flex;
    justify-content: center;
    gap: 24px;
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid #fce0e8;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: #8a7a80;
  }

  .legend-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
  }

  .legend-dot.pink { background: #f48fb1; }
  .legend-dot.light-red { background: #ef9a9a; }

  /* ── Responsive ── */
  @media (max-width: 400px) {
    .subjects { gap: 8px; }
    .subject-card { padding: 14px 8px 10px; }
    .subject-card .emoji { font-size: 24px; }
    .subject-card .name { font-size: 13px; }
    .check-circle { width: 28px; height: 28px; border-width: 2px; }
    .check-circle svg { width: 14px; height: 14px; }
    .container { padding: 0; }
    body { padding: 16px 8px 24px; }
    .progress-section { padding: 12px 14px; }
    .cal-day { aspect-ratio: 1; }
  }

  @media (min-width: 600px) {
    .subject-card { padding: 24px 16px 20px; }
    .subject-card .emoji { font-size: 36px; }
    .check-circle { width: 42px; height: 42px; }
    .check-circle svg { width: 24px; height: 24px; }
  }
</style>
</head>
<body>

<div class="container">

  <!-- Header -->
  <div class="header">
    <h1>🌸 作业打卡</h1>
    <div class="date-display" id="dateDisplay"></div>
    <div class="today-hint" id="todayHint"></div>
  </div>

  <!-- Progress -->
  <div class="progress-section">
    <div class="progress-label">今日完成 <span>|</span></div>
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progressFill"></div>
    </div>
    <div class="progress-count" id="progressCount">0/3</div>
  </div>

  <!-- Subject Cards -->
  <div class="subjects">
    <div class="subject-card chinese" data-subject="语文">
      <span class="emoji">📖</span>
      <div class="name">语文</div>
      <div class="check-circle">
        <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
      </div>
      <span class="only-today-badge">仅限今日打卡</span>
    </div>

    <div class="subject-card math" data-subject="数学">
      <span class="emoji">🔢</span>
      <div class="name">数学</div>
      <div class="check-circle">
        <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
      </div>
      <span class="only-today-badge">仅限今日打卡</span>
    </div>

    <div class="subject-card english" data-subject="英语">
      <span class="emoji">🔤</span>
      <div class="name">英语</div>
      <div class="check-circle">
        <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
      </div>
      <span class="only-today-badge">仅限今日打卡</span>
    </div>
  </div>

  <!-- Calendar -->
  <div class="calendar-section">
    <div class="cal-title-deco">✦ 打卡日历 ✦</div>
    <div class="cal-header">
      <div class="month-label" id="monthLabel"></div>
      <div class="cal-nav">
        <button id="prevMonth" aria-label="上个月">‹</button>
        <button id="nextMonth" aria-label="下个月">›</button>
      </div>
    </div>
    <div class="cal-weekdays">
      <span>日</span><span>一</span><span>二</span><span>三</span>
      <span>四</span><span>五</span><span>六</span>
    </div>
    <div class="cal-grid" id="calGrid"></div>
    <div class="legend">
      <div class="legend-item">
        <span class="legend-dot pink"></span> 全部完成
      </div>
      <div class="legend-item">
        <span class="legend-dot light-red"></span> 未完成
      </div>
    </div>
  </div>

</div>

<script>
  (function() {
    const STORAGE_KEY = 'homeworkChecklist';
    const SUBJECTS = ['语文', '数学', '英语'];

    let selectedDate = todayStr();
    let calYear, calMonth;

    function todayStr() {
      const d = new Date();
      return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
    }

    function parseDate(str) {
      const p = str.split('-');
      return { y: +p[0], m: +p[1], d: +p[2] };
    }

    function formatDisplay(str) {
      const p = parseDate(str);
      return p.y + '年' + p.m + '月' + p.d + '日';
    }

    function loadData() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        return raw ? JSON.parse(raw) : {};
      } catch { return {}; }
    }

    function saveData(data) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }

    function getSubjectsForDay(dateStr) {
      const data = loadData();
      const day = data[dateStr];
      if (!day) return { '语文': false, '数学': false, '英语': false };
      const result = {};
      SUBJECTS.forEach(function(s) { result[s] = !!day[s]; });
      return result;
    }

    function toggleSubject(dateStr, subject) {
      if (dateStr !== todayStr()) return;
      const data = loadData();
      if (!data[dateStr]) data[dateStr] = {};
      data[dateStr][subject] = !data[dateStr][subject];
      saveData(data);
    }

    function getDateStatus(dateStr) {
      const subjects = getSubjectsForDay(dateStr);
      const done = SUBJECTS.filter(function(s) { return subjects[s]; }).length;
      return { done: done, total: SUBJECTS.length, subjects: subjects };
    }

    function isToday(dateStr) {
      return dateStr === todayStr();
    }

    // ── Render ──
    function renderAll() {
      renderProgress();
      renderSubjectCards();
      renderCalendar();
    }

    function renderProgress() {
      const status = getDateStatus(selectedDate);
      document.getElementById('dateDisplay').textContent = formatDisplay(selectedDate);

      var hint = document.getElementById('todayHint');
      if (isToday(selectedDate)) {
        hint.textContent = '✨ 今天也要加油哦 ✨';
      } else {
        hint.textContent = '📋 查看历史记录';
      }

      var fill = document.getElementById('progressFill');
      var count = document.getElementById('progressCount');
      var pct = status.total > 0 ? (status.done / status.total * 100) : 0;
      fill.style.width = pct + '%';
      count.textContent = status.done + '/' + status.total;

      var label = document.querySelector('.progress-label');
      label.innerHTML = isToday(selectedDate)
        ? '今日完成 <span>|</span>'
        : '已完成 <span>|</span>';
    }

    function renderSubjectCards() {
      var status = getDateStatus(selectedDate);
      var isTodayFlag = isToday(selectedDate);

      document.querySelectorAll('.subject-card').forEach(function(card) {
        var subject = card.dataset.subject;
        var completed = status.subjects[subject];
        card.classList.toggle('completed', completed);
        card.classList.toggle('disabled', !isTodayFlag);
      });
    }

    function renderCalendar() {
      var now = new Date();
      if (calYear === undefined) calYear = now.getFullYear();
      if (calMonth === undefined) calMonth = now.getMonth();

      document.getElementById('monthLabel').textContent = calYear + '年 ' + (calMonth + 1) + '月';

      var grid = document.getElementById('calGrid');
      grid.innerHTML = '';

      var firstDay = new Date(calYear, calMonth, 1).getDay();
      var daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
      var today = todayStr();
      var data = loadData();

      for (var i = 0; i < firstDay; i++) {
        var cell = document.createElement('div');
        cell.className = 'cal-day empty';
        grid.appendChild(cell);
      }

      for (var d = 1; d <= daysInMonth; d++) {
        var dateStr = calYear + '-' + String(calMonth+1).padStart(2,'0') + '-' + String(d).padStart(2,'0');
        var cell = document.createElement('div');
        cell.className = 'cal-day';
        if (dateStr === today) cell.classList.add('today');
        if (dateStr === selectedDate) cell.classList.add('selected');

        var numSpan = document.createElement('span');
        numSpan.className = 'day-num';
        numSpan.textContent = d;
        cell.appendChild(numSpan);

        var dot = document.createElement('span');
        dot.className = 'dot';

        if (data[dateStr]) {
          var subjects = data[dateStr];
          var allDone = SUBJECTS.every(function(s) { return subjects[s]; });
          dot.classList.add(allDone ? 'pink' : 'light-red');
        } else {
          dot.classList.add('none');
        }

        cell.appendChild(dot);

        cell.addEventListener('click', function(ds) {
          return function() {
            selectedDate = ds;
            renderAll();
          };
        }(dateStr));

        grid.appendChild(cell);
      }
    }

    // ── Events ──
    document.querySelectorAll('.subject-card').forEach(function(card) {
      card.addEventListener('click', function() {
        if (!isToday(selectedDate)) return;
        var subject = this.dataset.subject;
        toggleSubject(selectedDate, subject);
        renderAll();
      });
    });

    document.getElementById('prevMonth').addEventListener('click', function() {
      calMonth--;
      if (calMonth < 0) { calMonth = 11; calYear--; }
      renderCalendar();
    });

    document.getElementById('nextMonth').addEventListener('click', function() {
      calMonth++;
      if (calMonth > 11) { calMonth = 0; calYear++; }
      renderCalendar();
    });

    renderAll();
  })();
</script>
</body>
</html>
